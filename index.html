<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Título bacana que aparece na aba do navegador -->
    <title>T.J Toon Jumper</title>
    <!-- Importando o arquivo de estilo (CSS) que deixa o jogo bonitão -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Fonte estilo arcade/retrô do Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <!-- Ícone da aba do navegador (favicon) -->
    <link rel="shortcut icon" href="imagens/intro.png">
</head>

<body>

    <!-- Tela de abertura do jogo com o logo do SENAI -->
    <div id="passioneScreen">
        <img id="startup-image" src="./imagens/logos/lgo_senai_1.png" alt="Tela de Abertura">
    </div>

    <!-- Cenário de chão do jogo -->
    <div class="cenario">
        <img src="imagens/chao/chaomario.gif" id="img1" class="chao">
    </div>

    <!-- Tabuleiro/Área principal onde o jogo acontece -->
    <div class="game-board">
        <!-- Tela inicial para digitação do Nickname -->
        <div class="tela-Inicial">
            <div class="senai">
                <img src="imagens/logos/lgo_jogo.png" alt="" width="350px">
            </div>
            <label for="nickname">Digite seu Nick:</label>
            <input type="text" id="nickname" placeholder="Seu Nick Aqui" maxlength="15">
            <div>
                <button id="start-button">Start</button>
            </div>
        </div>

        <!-- Fundo dinâmico da fase -->
        <div class="fundos">
            <img src="imagens/fundos/fundomenina.png" class="fundo-gif">
        </div>

        <!-- Tela de continuar/reiniciar ao perder vida -->
        <div class="tela-jogar-denovo">
            <h1>Voce deseja jogar outra vez?</h1>
            <div id="Continuar-Reniciar">
                <button class="Continuar" style="background-color: #44AF69; box-shadow: 0 4px #2a6f43;"
                    onclick="continuarReniciar('continuar')">Continuar</button>
                <button class="Reniciar" style="background-color: red; box-shadow: 0 4px #8a3030;"
                    onclick="continuarReniciar('Reniciar')">Reniciar</button>
            </div>
        </div>

        <div id="inferno-background"></div>
        <!-- Obstáculos: a cancela e o projétil bullet -->
        <img src="imagens/inimigos/cancela.gif" class="pipe">
        <img src="imagens/bullet.png" width="100px" class="bullet">
        <!-- Personagem principal: empilhadeira -->
        <img src="imagens/persona/empilhadeira.gif" class="mario" id="marioInicio">
        <!-- Nuvens no céu -->
        <img src="imagens/nuvems/mario.png" class="clouds">
        <!-- Efeito visual retrô de scanline -->
        <img src="imagens/filter.gif" class="scanline">
        <div id="star-layer"></div>

        <!-- Botão estilizado de pular para telas mobile -->
        <button id="jump-button-mobile" class="arcade-button" style="display: none;">PULAR</button>

        <!-- Placar e corações/vidas -->
        <div class="score-container">
            <div class="score">Score: 0</div>
        </div>

        <!-- Tela de Game Over final -->
        <div class="game-over-screen" style="display: none;">
            <h2>Game Over</h2>
            <p>Sua pontuação foi: <span id="final-score">0</span></p>
            <button id="restart-button" onclick="window.location.reload()">Jogar Novamente</button>
        </div>

    </div>
</body>
<!-- Script com a lógica principal do jogo -->
<script src="js/script.js" defer></script>

</html>
